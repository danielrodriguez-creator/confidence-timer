<!DOCTYPE html>

<html lang="es">

<head>

<meta charset="utf-8">

<title>Confidence Timer PRO</title>

<meta name="viewport" content="width=1920,height=1080">

 

<style>

html,body{

  margin:0;

  width:100%;

  height:100%;

  background:black;

  color:white;

  font-family:Arial,Helvetica,sans-serif;

  overflow:hidden;

}

 

/* ================= TIMER ================= */

#screen{

  display:flex;

  justify-content:center;

  align-items:center;

  height:100%;

}

#timer{

  font-size:520px;

  font-weight:900;

}

.warning{color:orange;}

.danger{color:red;}

.blink{animation:blink 1s infinite;}

@keyframes blink{50%{opacity:0;}}

 

/* ================= MANUAL ================= */

#manual{

  position:absolute;

  top:40px;

  width:100%;

  text-align:center;

  font-size:50px;

  opacity:.85;

  display:none;

}

 

/* ================= END ================= */

#end{

  position:fixed;

  inset:0;

  display:none;

  justify-content:center;

  align-items:center;

  text-align:center;

  background:

    radial-gradient(circle at center,#ffcc66 0%,#ff9933 45%,#cc6600 100%);

}

#endBox{

  padding:80px;

  background:rgba(0,0,0,.25);

}

#end h1{

  font-size:170px;

  margin:0 0 40px;

  color:#fff3c0;

  text-shadow:0 6px 16px rgba(0,0,0,.6);

}

#end p{

  font-size:58px;

  margin:20px 0;

}

#end .thanks{

  margin-top:30px;

  font-size:70px;

  color:#ffe9a6;

}

</style>

</head>

 

<body>

 

<div id="screen">

  <div id="timer">00:00</div>

</div>

 

<div id="manual">

  Ajustar tiempo: <span id="manualValue">0</span> minutos<br>

  OK confirmar · RETURN cancelar

</div>

 

<div id="end">

  <div id="endBox">

    <h1>Tu tiempo ha terminado</h1>

    <p>Por favor, concluye tu participación.</p>

    <div class="thanks">¡Gracias por tu colaboración!</div>

  </div>

</div>

 

<script>

/* ================= ESTADO GLOBAL ================= */

var total = 0;

var remaining = 0;

var running = false;

var interval = null;

var endTimestamp = 0;

 

var mode = "IDLE"; // IDLE | MANUAL | RUNNING | END

var manualBuffer = "";

 

/* ================= HELPERS ================= */

function pad(n){ return (n<10?"0":"")+n; }

 

function updateDisplay(){

  var t = document.getElementById("timer");

  t.textContent =

    pad(Math.floor(remaining/60)) + ":" + pad(remaining%60);

 

  t.className = "";

  if(remaining<=60 && remaining>10) t.className="warning";

  if(remaining<=10) t.className="danger blink";

}

 

/* ================= TIMER ROBUSTO ================= */

function tick(){

  if(!running) return;

 

  remaining = Math.max(

    0,

    Math.ceil((endTimestamp - Date.now()) / 1000)

  );

 

  updateDisplay();

 

  if(remaining <= 0){

    stopTimer();

    setTimeout(showEnd, 1500);

  }

}

 

function startTimer(){

  if(remaining<=0) return;

  running = true;

  mode = "RUNNING";

  endTimestamp = Date.now() + remaining * 1000;

  interval = setInterval(tick, 250); // tick rápido, cálculo real

}

 

function stopTimer(){

  running = false;

  if(interval){ clearInterval(interval); interval = null; }

}

 

/* ================= MANUAL ================= */

function startManual(digit){

  mode = "MANUAL";

  manualBuffer = digit || "";

  document.getElementById("manual").style.display="block";

  updateManual();

}

 

function updateManual(){

  document.getElementById("manualValue").textContent =

    manualBuffer==="" ? "0" : manualBuffer;

}

 

function confirmManual(){

  total = parseInt(manualBuffer,10) * 60;

  remaining = total;

  document.getElementById("manual").style.display="none";

  updateDisplay();

  startTimer();

}

 

function cancelManual(){

  manualBuffer="";

  mode="IDLE";

  document.getElementById("manual").style.display="none";

}

 

/* ================= END ================= */

function showEnd(){

  mode="END";

  document.getElementById("end").style.display="flex";

}

 

function resetAll(){

  stopTimer();

  total = 0;

  remaining = 0;

  mode = "IDLE";

  document.getElementById("end").style.display="none";

  var t = document.getElementById("timer");

  t.className="";

  t.textContent="00:00";

}

 

/* ================= FACTORY INIT ================= */

function factoryInit(){

  stopTimer();

  total = 0;

  remaining = 0;

  mode = "IDLE";

  manualBuffer = "";

  document.getElementById("manual").style.display="none";

  document.getElementById("end").style.display="none";

  var t = document.getElementById("timer");

  t.className="";

  t.textContent="00:00";

}

 

/* ================= INPUT ================= */

document.addEventListener("keydown",function(e){

 

  // END SCREEN

  if(mode==="END"){

    if(e.keyCode===13 || e.keyCode===10182){

      resetAll();

    }

    return;

  }

 

  // MANUAL

  if(mode==="MANUAL"){

    if(e.keyCode>=48 && e.keyCode<=57){

      manualBuffer+=String.fromCharCode(e.keyCode);

      updateManual(); return;

    }

    if(e.keyCode===13){ confirmManual(); return; }

    if(e.keyCode===10009 || e.key==="Escape"){ cancelManual(); return; }

    return;

  }

 

  // IDLE / RUNNING

  if(e.keyCode>=48 && e.keyCode<=57){

    startManual(String.fromCharCode(e.keyCode));

  }

});

 

/* ================= START ================= */

factoryInit();

</script>

 

</body>

</html>
